<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吉祥島</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ================= 基礎樣式設定 ================= */
        body {
            font-family: 'Rajdhani', 'Noto Sans TC', sans-serif;
            font-weight: 600;
            user-select: none;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #game-screen {
            background-color: #e8a81a;
            width: 100vw;
            height: 100vh;
            position: relative;
            padding: 3% 4%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 選單與標題 UI 樣式 */
        .title-underline { border-bottom: 1px solid #1a1a1a; margin-bottom: 0.5rem; padding-bottom: 0.2rem; width: 100%; }
        .district-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1a1a1a; padding-bottom: 0.2rem; margin-bottom: 0.3rem; }
        .district-arrow { color: #1a1a1a; cursor: pointer; transition: color 0.2s; }
        .district-arrow:hover, .district-arrow:active { color: white; }

        .menu-item-box {
            background-color: #313134; border: 1px solid #9aa0aa; color: white;
            padding: 0.1rem 0.3rem; display: flex; align-items: center; font-size: 0.75rem;
            letter-spacing: 0.05em; text-transform: uppercase; text-shadow: 1px 1px 0 #000;
            transition: all 0.2s ease; min-height: 1.6rem;
        }
        .menu-indicator-box { background-color: #8e939f; border: 1px solid #bcc0c9; width: 1.1rem; display: flex; justify-content: center; align-items: center; margin-left: 0.2rem; }
        .indicator-core { width: 50%; height: 50%; background-color: #b0b4be; border-top: 1px solid #e0e2e8; border-left: 1px solid #e0e2e8; border-bottom: 1px solid #6a6f7a; border-right: 1px solid #6a6f7a; }
        
        .menu-item.active .menu-item-box { color: #e8a81a; border-color: #fff; }
        .menu-item.active .indicator-core { background-color: #fff; border-color: #fff; animation: blink 0.8s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.5; } }

        /* 訊息對話框 UI */
        .message-tab { background-color: #313134; border: 1px solid #9aa0aa; border-bottom: none; color: white; display: inline-block; padding: 0.1rem 0.6rem; font-size: 0.75rem; text-transform: uppercase; border-top-left-radius: 4px; border-top-right-radius: 4px; position: relative; top: 1px; z-index: 10; }
        .message-body { background-color: #313134; border: 1px solid #9aa0aa; color: white; padding: 0.6rem 0.8rem; font-size: 0.85rem; font-weight: 500; min-height: 60px; position: relative; z-index: 5; text-shadow: 1px 1px 0 #000; letter-spacing: 0.05em; }
        .footer-text { font-size: 0.7rem; color: #1a1a1a; display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; font-weight: bold; letter-spacing: 0.05em; }
        .footer-text span.divider { color: #1a1a1a; margin: 0 0.4rem; }

        /* ================= 3D 地圖與高塔特效區域 ================= */
        .map-wrapper { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; z-index: 1; opacity: 0.6; transition: all 0.5s ease; overflow: visible; }
        .map-3d-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; perspective: 1200px; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease; will-change: transform, opacity; opacity: 0; pointer-events: none; }
        .map-3d-container.active { transform: translateX(0) scale(1); opacity: 1; z-index: 2; }
        .map-3d-container.prev { transform: translateX(-50vw) scale(0.6); opacity: 0; z-index: 1; }
        .map-3d-container.next { transform: translateX(50vw) scale(0.6); opacity: 0; z-index: 1; }

        /* 即時影像 & 統計面板 UI */
        .video-feed-wrapper { position: absolute; top: 12%; right: 4%; z-index: 20; display: flex; flex-direction: column; align-items: flex-end; pointer-events: none; }
        #stats-panel { position: absolute; bottom: 120px; right: 4%; z-index: 20; display: flex; flex-direction: column; align-items: flex-end; pointer-events: none; gap: 0.3rem; }
        
        .video-box { border: 1px solid #1a1a1a; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(4px); padding: 3px; opacity: 0; transform: scale(0.95); transition: opacity 0.3s ease 0.4s, transform 0.3s ease 0.4s; box-shadow: 4px 4px 0 rgba(26,26,26,0.3); }
        .video-screen { width: auto; height: auto; max-width: 180px; max-height: 120px; object-fit: contain; }
        .video-label { font-size: 0.75rem; color: #1a1a1a; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #1a1a1a; padding-bottom: 2px; margin-bottom: 4px; opacity: 0; transition: opacity 0.3s ease 0.4s; }
        
        .video-feed-wrapper.active .video-box, .video-feed-wrapper.active .video-label, #stats-panel.active .video-box, #stats-panel.active .video-label { opacity: 1; transform: scale(1); }

        /* 頭像與掃描線 */
        .avatar-wrapper { display: flex; flex-direction: column; flex-shrink: 0; }
        .avatar-box { background-color: #313134; border: 1px solid #9aa0aa; padding: 3px; width: 80px; height: 80px; position: relative; box-shadow: 3px 3px 0 rgba(26,26,26,0.4); }
        .avatar-video { width: 100%; height: 100%; object-fit: cover; }
        .scanlines { background: repeating-linear-gradient(to bottom, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0) 1px, rgba(0, 0, 0, 0.2) 1px, rgba(0, 0, 0, 0.2) 3px); }

        /* 動態追蹤連線 */
        #dynamic-line-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; }
        .tracking-line { fill: none; stroke: #1a1a1a; stroke-width: 1.5px; stroke-dasharray: 2000; stroke-dashoffset: 2000; transition: none; }
        .tracking-line.active { stroke-dashoffset: 0; transition: stroke-dashoffset 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .tracking-dot { fill: #1a1a1a; opacity: 0; transition: opacity 0.2s; }
        .tracking-dot.active { opacity: 1; }
        .tracking-anchor { fill: #e8a81a; stroke: #1a1a1a; stroke-width: 1.5px; opacity: 0; transition: opacity 0.2s ease 0.4s; }
        .tracking-anchor.active { opacity: 1; }

        /* ================= PC 版響應式設定 ================= */
        @media (min-width: 768px) {
            .menu-item-box { font-size: 0.9rem; padding: 0.2rem 0.5rem; min-height: 1.8rem; }
            .menu-indicator-box { width: 1.3rem; }
            .message-tab { font-size: 0.9rem; padding: 0.2rem 0.8rem 0.1rem 0.4rem; }
            .message-body { font-size: 1rem; padding: 0.8rem 1rem; min-height: 80px; }
            .footer-text { font-size: 0.8rem; justify-content: flex-start; }
            .map-wrapper { top: 48%; left: 42%; transform: translate(-50%, -50%); width: 650px; height: 650px; z-index: 5; opacity: 1; }
            .video-feed-wrapper { top: 14%; right: 5%; }
            .video-screen { max-width: 360px; max-height: 220px; } 
            .video-label { font-size: 0.9rem; margin-bottom: 6px; }
            #stats-panel { top: auto; bottom: 150px; width: 280px; gap: 0.5rem; } 
            .avatar-box { width: 110px; height: 110px; } 
        }

        /* ================= WebP 圖片與地圖特效 ================= */
        .map-3d { width: 100%; height: 100%; transform-style: preserve-3d; transform: rotateX(60deg) rotateZ(0deg); animation: rotateMap 35s linear infinite; }
        
        /* 姐姐的黑魔法：mix-blend-mode: screen 會把黑色的底變成透明！ */
        img.map-layer { 
            position: absolute; 
            top: 0; left: 0; right: 0; bottom: 0; 
            width: 100%; height: 100%; 
            object-fit: contain;
            pointer-events: none;
            mix-blend-mode: screen; 
        }

        /* 做出景深：底層比較暗，越上面越亮 */
        img.map-layer:nth-child(1) { transform: translateZ(0px); opacity: 0.3; filter: brightness(0.5); }
        img.map-layer:nth-child(2) { transform: translateZ(4px); opacity: 0.5; filter: brightness(0.6); }
        img.map-layer:nth-child(3) { transform: translateZ(8px); opacity: 0.7; filter: brightness(0.8); }
        img.map-layer:nth-child(4) { transform: translateZ(12px); opacity: 0.9; filter: brightness(0.9); }
        img.map-layer:nth-child(5) { transform: translateZ(16px); opacity: 1; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }

        @keyframes rotateMap { 0% { transform: rotateX(60deg) rotateZ(0deg); } 100% { transform: rotateX(60deg) rotateZ(360deg); } }

        .tower-container { position: absolute; width: 0; height: 0; transform: translateZ(17px) scale(1); transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .tower-plane { position: absolute; bottom: 0; left: -20px; width: 40px; height: 150px; transform-origin: bottom center; overflow: visible; }
        .plane-1 { transform: rotateX(-90deg); }
        .plane-2 { transform: rotateX(-90deg) rotateY(90deg); }
        .tower-plane polygon { fill: rgba(255, 255, 255, 0.05); stroke: #555; transition: all 0.3s ease; }
        .tower-plane line { stroke: #555; transition: all 0.3s ease; }
        
        .tower-container.active { transform: translateZ(17px) scale(1.4); }
        .tower-container.active .tower-plane polygon { fill: rgba(255, 255, 255, 0.9); stroke: #e8a81a; stroke-width: 1.5px; }
        .tower-container.active .tower-plane line { stroke: #e8a81a; stroke-width: 2px;}

        /* 將 SVG 圓點改成 Div，並用絕對定位 */
        .map-point { 
            position: absolute;
            width: 8px; height: 8px;
            background-color: #ffffff;
            border-radius: 50%;
            transform: translate(-50%, -50%) translateZ(20px); /* 浮在圖層上面 */
            transition: all 0.3s ease; 
            cursor: pointer;
            z-index: 10;
        }
        .map-point.active { 
            background-color: #e8a81a; 
            width: 14px; height: 14px; 
            box-shadow: 0 0 10px #fff; 
            border: 1.5px solid #000; 
        }

        #menu-container { max-height: 55vh; overflow-y: auto; padding-right: 6px; }
        #menu-container::-webkit-scrollbar { width: 4px; }
        #menu-container::-webkit-scrollbar-track { background: rgba(26, 26, 26, 0.5); border-radius: 2px; }
        #menu-container::-webkit-scrollbar-thumb { background: #8e939f; border-radius: 2px; }
        #menu-container::-webkit-scrollbar-thumb:hover { background: #e8a81a; }
        .donut-segment { transition: stroke-dasharray 0.6s ease, stroke-dashoffset 0.6s ease; }
    </style>
</head>

<!-- ================= 4. 主要邏輯 ================= -->
<script>
    const rawData = document.getElementById('game-data').textContent;
    const districtsData = JSON.parse(rawData);

    // 改為去抓 map-webp-0、1、2
    const mainMapWrapper = document.getElementById('main-map-wrapper');
    districtsData.forEach((_, index) => {
        const tpl = document.getElementById(`map-webp-${index}`);
        const container = document.createElement('div');
        container.id = `map-district-${index}`;
        container.className = 'map-3d-container';
        if (tpl) {
            container.appendChild(tpl.content.cloneNode(true));
        }
        mainMapWrapper.appendChild(container);
    });

    // --- 下面的邏輯完全不需要動！ ---
    let currentDistrictIndex = 0;
    let currentLocationIndex = 0; 
    
    const menuContainer = document.getElementById('menu-container');
    const messageText = document.getElementById('message-text');
    const districtTitle = document.getElementById('district-title');
    const videoWrapper = document.getElementById('video-feed-wrapper');
    const statsPanel = document.getElementById('stats-panel');
    const videoNode = document.getElementById('node-video');

    const trackingLine = document.getElementById('tracking-line');
    const trackingDot = document.getElementById('tracking-dot');
    const trackingAnchor = document.getElementById('tracking-anchor');

    window.prevDistrict = function() {
        currentDistrictIndex = (currentDistrictIndex > 0) ? currentDistrictIndex - 1 : districtsData.length - 1;
        currentLocationIndex = 0;
        updateMapCarousel();
        renderMenu();
    }
    window.nextDistrict = function() {
        currentDistrictIndex = (currentDistrictIndex < districtsData.length - 1) ? currentDistrictIndex + 1 : 0;
        currentLocationIndex = 0;
        updateMapCarousel();
        renderMenu();
    }

    function updateMapCarousel() {
        districtsData.forEach((_, index) => {
            const mapEl = document.getElementById(`map-district-${index}`);
            mapEl.classList.remove('active', 'prev', 'next');
            if (index === currentDistrictIndex) {
                mapEl.classList.add('active');
            } else if (index < currentDistrictIndex || (currentDistrictIndex === 0 && index === districtsData.length - 1)) {
                mapEl.classList.add('prev');
            } else {
                mapEl.classList.add('next');
            }
        });
    }

    function updateStatsPanel(stats) {
        document.getElementById('stat-pop-text').innerText = `${stats.pop}%`;
        document.getElementById('stat-pop-bar').style.width = `${stats.pop}%`;

        const yujie = stats.vibes[0];
        const shaoyu = stats.vibes[1];
        const shaonv = stats.vibes[2];
        
        document.getElementById('stat-v1').innerText = `${yujie}%`;
        document.getElementById('stat-v2').innerText = `${shaoyu}%`;
        document.getElementById('stat-v3').innerText = `${shaonv}%`;

        document.getElementById('pie-yujie').setAttribute('stroke-dasharray', `${yujie} ${100 - yujie}`);
        document.getElementById('pie-yujie').setAttribute('stroke-dashoffset', `25`); 
        
        document.getElementById('pie-shaoyu').setAttribute('stroke-dasharray', `${shaoyu} ${100 - shaoyu}`);
        document.getElementById('pie-shaoyu').setAttribute('stroke-dashoffset', `${25 - yujie}`);
        
        document.getElementById('pie-shaonv').setAttribute('stroke-dasharray', `${shaonv} ${100 - shaonv}`);
        document.getElementById('pie-shaonv').setAttribute('stroke-dashoffset', `${25 - yujie - shaoyu}`);

        const jobsContainer = document.getElementById('stat-jobs-container');
        jobsContainer.innerHTML = '';
        stats.jobs.forEach(job => {
            jobsContainer.innerHTML += `
                <div class="flex justify-between items-center w-full">
                    <span class="text-[#8e939f] w-14">${job.n}</span>
                    <div class="flex-grow h-[3px] bg-[#1a1a1a] mx-1 md:mx-2">
                        <div class="h-full bg-[#bcc0c9]" style="width: ${job.v}%"></div>
                    </div>
                    <span class="text-white w-6 text-right">${job.v}%</span>
                </div>
            `;
        });
    }

    function renderMenu() {
        const currentData = districtsData[currentDistrictIndex];
        const currentItem = currentData.items[currentLocationIndex];
        
        districtTitle.innerText = currentData.name;

        menuContainer.innerHTML = '';
        currentData.items.forEach((item, index) => {
            const isActive = index === currentLocationIndex;
            const menuItemHTML = `
                <div class="menu-item flex items-stretch cursor-pointer ${isActive ? 'active' : ''}" onclick="selectItem(${index})">
                    <div class="menu-item-box flex-grow">
                        ${item.label}
                    </div>
                    <div class="menu-indicator-box">
                        <div class="indicator-core"></div>
                    </div>
                </div>
            `;
            menuContainer.innerHTML += menuItemHTML;
        });
        
        currentData.items.forEach((item, index) => {
            const pointId = `d${currentDistrictIndex}-point-${index}`;
            const pointEl = document.getElementById(pointId);
            if (pointEl) {
                if (index === currentLocationIndex) {
                    pointEl.classList.add('active');
                } else {
                    pointEl.classList.remove('active');
                }
            }

            if (item.towerId) {
                const towerEl = document.getElementById(item.towerId);
                if (towerEl) {
                    if (index === currentLocationIndex) {
                        towerEl.classList.add('active');
                    } else {
                        towerEl.classList.remove('active');
                    }
                }
            }
        });

        if (menuContainer.children[currentLocationIndex]) {
            menuContainer.children[currentLocationIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        typeMessage(currentItem.message);

        videoWrapper.classList.remove('active');
        statsPanel.classList.remove('active');
        trackingLine.classList.remove('active');
        trackingDot.classList.remove('active');
        trackingAnchor.classList.remove('active');
        
        setTimeout(() => {
            if(currentItem.stats) updateStatsPanel(currentItem.stats);

            if (currentItem.video) {
                videoNode.src = currentItem.video;
                videoNode.load();
                videoNode.play().catch(e => console.warn("影片播放阻擋:", e));

                videoWrapper.classList.add('active');
                statsPanel.classList.add('active');
                trackingLine.classList.add('active');
                trackingDot.classList.add('active');
                trackingAnchor.classList.add('active');
            } else {
                videoNode.removeAttribute('src');
                videoNode.load();
            }
        }, 50);
    }

    function updateTrackingLine() {
        requestAnimationFrame(updateTrackingLine); 
        
        if (!videoWrapper.classList.contains('active')) return;
        
        const activePoint = document.getElementById(`d${currentDistrictIndex}-point-${currentLocationIndex}`);
        const videoBox = document.querySelector('.video-feed-wrapper .video-box');
        
        if (activePoint && videoBox) {
            const ptRect = activePoint.getBoundingClientRect();
            const vdRect = videoBox.getBoundingClientRect();
            const containerRect = document.getElementById('game-screen').getBoundingClientRect();
            
            const nx = ptRect.left + ptRect.width / 2 - containerRect.left;
            const ny = ptRect.top + ptRect.height / 2 - containerRect.top;
            
            const vx = vdRect.left - containerRect.left;
            const vy = vdRect.bottom - containerRect.top - 8;
            
            const elbowX = vx - 30;
            const elbowY = vy + 30;
            const points = `${nx},${ny} ${nx},${ny - 20} ${elbowX},${elbowY} ${vx},${vy}`;
            
            trackingLine.setAttribute('points', points);
            trackingDot.setAttribute('cx', nx);
            trackingDot.setAttribute('cy', ny);
            
            trackingAnchor.setAttribute('x', vx - 3);
            trackingAnchor.setAttribute('y', vy - 3);
        }
    }

    updateTrackingLine();

    let typeTimeout;
    function typeMessage(text) {
        clearTimeout(typeTimeout);
        messageText.innerHTML = '';
        let i = 0;
        function typeChar() {
            if (i < text.length) {
                messageText.innerHTML += text.charAt(i);
                i++;
                typeTimeout = setTimeout(typeChar, 15);
            }
        }
        typeChar();
    }

    window.selectItem = function(index) {
        if (currentLocationIndex !== index) {
            currentLocationIndex = index;
            renderMenu();
        }
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
            const itemsLength = districtsData[currentDistrictIndex].items.length;
            currentLocationIndex = (currentLocationIndex > 0) ? currentLocationIndex - 1 : itemsLength - 1;
            renderMenu();
            e.preventDefault();
        } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
            const itemsLength = districtsData[currentDistrictIndex].items.length;
            currentLocationIndex = (currentLocationIndex < itemsLength - 1) ? currentLocationIndex + 1 : 0;
            renderMenu();
            e.preventDefault();
        } 
        else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
            prevDistrict();
            e.preventDefault();
        } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
            nextDistrict();
            e.preventDefault();
        }
        else if (e.key === 'Enter' || e.key === ' ') {
            const currentText = messageText.innerText;
            messageText.innerHTML = "<span style='color:#e8a81a'>Connecting to Node...</span>";
            setTimeout(() => {
                typeMessage(currentText);
            }, 400);
        }
    });

    updateMapCarousel();
    renderMenu();
</script>
