<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Geo-System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 基礎字體與無選取設定 */
        body {
            font-family: 'Rajdhani', 'Noto Sans TC', sans-serif;
            font-weight: 600;
            user-select: none;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 遊戲畫面容器，滿版自適應設定 */
        #game-screen {
            background-color: #e8a81a;
            width: 100vw;
            height: 100vh;
            position: relative;
            padding: 3% 4%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 頂部標題底線 */
        .title-underline {
            border-bottom: 1px solid #1a1a1a;
            margin-bottom: 0.5rem;
            padding-bottom: 0.2rem;
            width: 100%;
        }

        /* 區域名稱切換器 */
        .district-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 0.2rem;
            margin-bottom: 0.3rem;
        }
        .district-arrow {
            color: #1a1a1a;
            cursor: pointer;
            transition: color 0.2s;
        }
        .district-arrow:hover, .district-arrow:active {
            color: white;
        }

        /* 選單項目樣式 */
        .menu-item-box {
            background-color: #313134;
            border: 1px solid #9aa0aa;
            color: white;
            padding: 0.1rem 0.3rem;
            display: flex;
            align-items: center;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            text-shadow: 1px 1px 0 #000;
            transition: all 0.2s ease;
            min-height: 1.6rem;
        }

        /* 側邊小方塊 (按鈕指示器) */
        .menu-indicator-box {
            background-color: #8e939f;
            border: 1px solid #bcc0c9;
            width: 1.1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 0.2rem;
        }

        .indicator-core {
            width: 50%;
            height: 50%;
            background-color: #b0b4be;
            border-top: 1px solid #e0e2e8;
            border-left: 1px solid #e0e2e8;
            border-bottom: 1px solid #6a6f7a;
            border-right: 1px solid #6a6f7a;
        }

        /* 選中狀態特效 */
        .menu-item.active .menu-item-box {
            color: #e8a81a;
            border-color: #fff;
        }
        .menu-item.active .indicator-core {
            background-color: #fff;
            border-color: #fff;
            animation: blink 0.8s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }

        /* 訊息框標籤 */
        .message-tab {
            background-color: #313134;
            border: 1px solid #9aa0aa;
            border-bottom: none;
            color: white;
            display: inline-block;
            padding: 0.1rem 0.6rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
            position: relative;
            top: 1px;
            z-index: 10;
        }

        /* 訊息框主體 */
        .message-body {
            background-color: #313134;
            border: 1px solid #9aa0aa;
            color: white;
            padding: 0.6rem 0.8rem;
            font-size: 0.85rem;
            font-weight: 500;
            min-height: 60px;
            position: relative;
            z-index: 5;
            text-shadow: 1px 1px 0 #000;
            letter-spacing: 0.05em;
        }

        /* 底部操作說明 */
        .footer-text {
            font-size: 0.7rem;
            color: #1a1a1a;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.4rem;
            font-weight: bold;
            letter-spacing: 0.05em;
        }
        
        .footer-text span.divider {
            color: #1a1a1a;
            margin: 0 0.4rem;
        }

        /* =========================================
           3D 地圖與高塔特效區域 
           ========================================= */
        .map-wrapper {
            position: absolute;
            top: 45%;
            left: 50%; /* 改用 left 基準來定位，避開右側巨大的影片 */
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            z-index: 1;
            opacity: 0.6;
            transition: all 0.5s ease;
            overflow: visible;
        }

        .map-3d-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            perspective: 1200px;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease;
            will-change: transform, opacity;
            opacity: 0;
            pointer-events: none;
        }
        .map-3d-container.active { transform: translateX(0) scale(1); opacity: 1; z-index: 2; }
        .map-3d-container.prev { transform: translateX(-50vw) scale(0.6); opacity: 0; z-index: 1; }
        .map-3d-container.next { transform: translateX(50vw) scale(0.6); opacity: 0; z-index: 1; }

        /* =========================================
           即時影像 & 統計數據 面板
           ========================================= */
        .video-feed-wrapper {
            position: absolute;
            top: 4%;
            right: 4%;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            pointer-events: none;
        }

        #stats-panel {
            position: absolute;
            top: calc(4% + 160px); 
            right: 4%;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            pointer-events: none;
            gap: 0.3rem;
        }

        /* 統一的戰術外框 */
        .video-box {
            border: 1px solid #1a1a1a;
            background: rgba(0, 0, 0, 0.75); 
            backdrop-filter: blur(4px);
            padding: 3px;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.3s ease 0.4s, transform 0.3s ease 0.4s;
            box-shadow: 4px 4px 0 rgba(26,26,26,0.3);
        }

        .video-screen {
            width: auto; height: auto;
            max-width: 180px; max-height: 120px;
            object-fit: contain;
            /* 移除了戰術濾鏡，保持影片原始乾淨的色彩 */
        }

        .video-label {
            font-size: 0.75rem;
            color: #1a1a1a;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 2px;
            margin-bottom: 4px;
            opacity: 0;
            transition: opacity 0.3s ease 0.4s;
        }

        /* 聯動顯示動畫 */
        .video-feed-wrapper.active .video-box,
        .video-feed-wrapper.active .video-label,
        #stats-panel.active .video-box,
        #stats-panel.active .video-label {
            opacity: 1;
            transform: scale(1);
        }

        /* 播報員頭像區域 (COMM) */
        .avatar-wrapper {
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .avatar-box {
            background-color: #313134;
            border: 1px solid #9aa0aa;
            padding: 3px;
            width: 80px;
            height: 80px;
            position: relative;
            box-shadow: 3px 3px 0 rgba(26,26,26,0.4);
        }
        .avatar-video {
            width: 100%; height: 100%;
            object-fit: cover;
            /* 移除了戰術濾鏡，保持原始乾淨畫面 */
        }
        .scanlines {
            background: repeating-linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0),
                rgba(0, 0, 0, 0) 1px,
                rgba(0, 0, 0, 0.2) 1px,
                rgba(0, 0, 0, 0.2) 3px
            );
        }

        /* 動態追蹤黑線 */
        #dynamic-line-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 15; 
        }
        .tracking-line {
            fill: none; stroke: #1a1a1a; stroke-width: 1.5px;
            stroke-dasharray: 2000; stroke-dashoffset: 2000; transition: none; 
        }
        .tracking-line.active {
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .tracking-dot { fill: #1a1a1a; opacity: 0; transition: opacity 0.2s; }
        .tracking-dot.active { opacity: 1; }
        .tracking-anchor {
            fill: #e8a81a; stroke: #1a1a1a; stroke-width: 1.5px;
            opacity: 0; transition: opacity 0.2s ease 0.4s; 
        }
        .tracking-anchor.active { opacity: 1; }

        /* =========================================
           PC 版響應式設定 (大幅放大尺寸、重新規劃佔比)
           ========================================= */
        @media (min-width: 768px) {
            .menu-item-box { font-size: 0.9rem; padding: 0.2rem 0.5rem; min-height: 1.8rem; }
            .menu-indicator-box { width: 1.3rem; }
            .message-tab { font-size: 0.9rem; padding: 0.2rem 0.8rem 0.1rem 0.4rem; }
            .message-body { font-size: 1rem; padding: 0.8rem 1rem; min-height: 80px; }
            .footer-text { font-size: 0.8rem; justify-content: flex-start; }
            
            /* 3D地圖巨型化，並偏向左中，讓出右邊空間 */
            .map-wrapper { top: 48%; left: 42%; transform: translate(-50%, -50%); width: 650px; height: 650px; z-index: 5; opacity: 1; }
            
            /* 影片巨型化 (~3倍大) */
            .video-screen { max-width: 450px; max-height: 280px; } 
            .video-label { font-size: 0.9rem; margin-bottom: 6px; }
            
            /* 統計面板跟著拉寬，並往下推移避開巨大影片 */
            #stats-panel { top: calc(4% + 320px); width: 280px; gap: 0.5rem; } 
            
            /* 頭像巨型化 */
            .avatar-box { width: 110px; height: 110px; } 
        }

        .map-3d { width: 100%; height: 100%; transform-style: preserve-3d; transform: rotateX(60deg) rotateZ(0deg); animation: rotateMap 35s linear infinite; }
        .map-layer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; }
        .map-layer:nth-child(1) { transform: translateZ(0px); }
        .map-layer:nth-child(2) { transform: translateZ(4px); }
        .map-layer:nth-child(3) { transform: translateZ(8px); }
        .map-layer:nth-child(4) { transform: translateZ(12px); }
        .map-layer:nth-child(5) { transform: translateZ(16px); }

        @keyframes rotateMap {
            0% { transform: rotateX(60deg) rotateZ(0deg); }
            100% { transform: rotateX(60deg) rotateZ(360deg); }
        }

        .tower-container { position: absolute; width: 0; height: 0; transform: translateZ(17px); transform-style: preserve-3d; transition: all 0.5s ease; }
        .tower-plane { position: absolute; bottom: 0; left: -20px; width: 40px; height: 150px; transform-origin: bottom center; overflow: visible; }
        .plane-1 { transform: rotateX(-90deg); }
        .plane-2 { transform: rotateX(-90deg) rotateY(90deg); }
        .tower-plane polygon { fill: rgba(255, 255, 255, 0.1); stroke: #555; transition: all 0.3s ease; }
        .tower-plane line { stroke: #555; transition: all 0.3s ease; }
        .tower-container.active { filter: drop-shadow(0 0 15px rgba(232, 168, 26, 0.8)); }
        .tower-container.active .tower-plane polygon { fill: rgba(232, 168, 26, 0.4); stroke: #fff; }
        .tower-container.active .tower-plane line { stroke: #e8a81a; stroke-width: 1.5px;}

        .map-point { transition: all 0.3s ease; transform-origin: center; }
        .map-point.active { fill: #e8a81a; r: 6; filter: drop-shadow(0 0 8px #fff); stroke: #000; stroke-width: 1.5px; }

        #menu-container { max-height: 55vh; overflow-y: auto; padding-right: 6px; }
        #menu-container::-webkit-scrollbar { width: 4px; }
        #menu-container::-webkit-scrollbar-track { background: rgba(26, 26, 26, 0.5); border-radius: 2px; }
        #menu-container::-webkit-scrollbar-thumb { background: #8e939f; border-radius: 2px; }
        #menu-container::-webkit-scrollbar-thumb:hover { background: #e8a81a; }

        /* SVG Donut Chart Animation */
        .donut-segment { transition: stroke-dasharray 0.6s ease, stroke-dashoffset 0.6s ease; }
    </style>
</head>
<body>

<div id="game-screen">
    
    <!-- 頂部標題 -->
    <div class="title-underline relative z-10 flex justify-between items-end">
        <h1 class="text-[12px] md:text-xl font-bold text-[#1a1a1a] tracking-wider uppercase">*DATABASE : Global Sectors</h1>
        <div class="text-[10px] md:text-xs font-bold text-[#1a1a1a] tracking-widest uppercase">SYS.VER_2.0.26</div>
    </div>

    <!-- 左側選單 -->
    <div class="flex flex-col w-[160px] md:w-64 mt-2 mb-auto z-10">
        <div class="district-header">
            <div class="text-[14px] md:text-lg district-arrow" onclick="prevDistrict()">◀</div>
            <div id="district-title" class="text-[14px] md:text-lg font-bold text-[#1a1a1a] tracking-widest uppercase text-shadow-sm">HOKKAIDO</div>
            <div class="text-[14px] md:text-lg district-arrow" onclick="nextDistrict()">▶</div>
        </div>
        <div class="flex flex-col gap-[0.35rem]" id="menu-container"></div>
    </div>

    <!-- 右上角：即時影像面板 -->
    <div id="video-feed-wrapper" class="video-feed-wrapper">
        <div class="video-label w-full text-right">* LIVE FEED</div>
        <div class="video-box relative">
            <video id="node-video" class="video-screen" autoplay loop muted playsinline></video>
        </div>
    </div>

    <!-- 右側：資料統計面板 -->
    <div id="stats-panel" class="w-[150px] md:w-[280px]">
        <div class="video-label w-full text-right mb-[2px]">* DEMOGRAPHICS</div>
        
        <!-- 人口佔比 -->
        <div class="video-box w-full p-[4px] md:p-[8px] text-white">
            <div class="flex justify-between text-[10px] md:text-[12px] text-[#e8a81a] font-bold">
                <span>人口占比 POP.</span>
                <span id="stat-pop-text">0.0%</span>
            </div>
            <div class="w-full h-[4px] bg-[#1a1a1a] mt-[2px] md:mt-1">
                <div id="stat-pop-bar" class="h-full bg-[#e8a81a] transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>

        <!-- 屬性調性 (圓餅圖) -->
        <div class="video-box w-full p-[4px] md:p-3 flex items-center justify-between text-white">
            <!-- r=15.9155 代表圓周長剛好為 100 -->
            <svg viewBox="0 0 40 40" class="w-12 h-12 md:w-16 md:h-16 transform -rotate-90 drop-shadow-md flex-shrink-0">
                <circle cx="20" cy="20" r="15.9155" fill="none" stroke="#1a1a1a" stroke-width="6"></circle>
                <!-- 御姐 (黃) -->
                <circle id="pie-yujie" class="donut-segment" cx="20" cy="20" r="15.9155" fill="none" stroke="#e8a81a" stroke-width="6" stroke-dasharray="0 100" stroke-dashoffset="25"></circle>
                <!-- 少御 (灰) -->
                <circle id="pie-shaoyu" class="donut-segment" cx="20" cy="20" r="15.9155" fill="none" stroke="#8e939f" stroke-width="6" stroke-dasharray="0 100" stroke-dashoffset="25"></circle>
                <!-- 少女 (白) -->
                <circle id="pie-shaonv" class="donut-segment" cx="20" cy="20" r="15.9155" fill="none" stroke="#ffffff" stroke-width="6" stroke-dasharray="0 100" stroke-dashoffset="25"></circle>
            </svg>
            <div class="flex flex-col text-[9px] md:text-[11px] font-bold w-[58%] leading-relaxed">
                <div class="flex justify-between"><span class="text-[#e8a81a]">御姐 V1</span><span id="stat-v1">0%</span></div>
                <div class="flex justify-between"><span class="text-[#8e939f]">少御 V2</span><span id="stat-v2">0%</span></div>
                <div class="flex justify-between"><span class="text-white">少女 V3</span><span id="stat-v3">0%</span></div>
            </div>
        </div>

        <!-- 職業佔比 -->
        <div class="video-box w-full p-[4px] md:p-[8px] text-white flex flex-col gap-[2px] md:gap-1 text-[9px] md:text-[11px] font-bold" id="stat-jobs-container">
            <!-- JS 動態生成 -->
        </div>
    </div>

    <!-- 動態追蹤黑線 -->
    <svg id="dynamic-line-canvas">
        <polyline id="tracking-line" class="tracking-line"></polyline>
        <circle id="tracking-dot" class="tracking-dot" r="3"></circle>
        <rect id="tracking-anchor" class="tracking-anchor" width="6" height="6" x="-3" y="-3"></rect>
    </svg>

    <!-- 右側 3D 地圖容器 -->
    <div class="map-wrapper pointer-events-none">
        <!-- District 0: 北海道 Hokkaido -->
        <div id="map-district-0" class="map-3d-container active">
            <div class="map-3d">
                <svg class="map-layer" viewBox="0 0 200 200"><polygon points="48,162 42,155 35,140 32,125 40,118 48,110 40,102 42,92 50,90 58,85 65,72 70,55 75,40 80,28 85,25 90,28 95,45 105,55 115,52 130,48 145,42 160,45 168,52 155,65 145,72 158,80 172,85 185,90 175,98 160,102 145,108 135,122 125,135 115,148 105,145 95,138 85,125 75,128 65,140 55,152" fill="#000000" /></svg>
                <svg class="map-layer" viewBox="0 0 200 200"><polygon points="48,162 42,155 35,140 32,125 40,118 48,110 40,102 42,92 50,90 58,85 65,72 70,55 75,40 80,28 85,25 90,28 95,45 105,55 115,52 130,48 145,42 160,45 168,52 155,65 145,72 158,80 172,85 185,90 175,98 160,102 145,108 135,122 125,135 115,148 105,145 95,138 85,125 75,128 65,140 55,152" fill="#050505" /></svg>
                <svg class="map-layer" viewBox="0 0 200 200"><polygon points="48,162 42,155 35,140 32,125 40,118 48,110 40,102 42,92 50,90 58,85 65,72 70,55 75,40 80,28 85,25 90,28 95,45 105,55 115,52 130,48 145,42 160,45 168,52 155,65 145,72 158,80 172,85 185,90 175,98 160,102 145,108 135,122 125,135 115,148 105,145 95,138 85,125 75,128 65,140 55,152" fill="#0a0a0a" /></svg>
                <svg class="map-layer" viewBox="0 0 200 200"><polygon points="48,162 42,155 35,140 32,125 40,118 48,110 40,102 42,92 50,90 58,85 65,72 70,55 75,40 80,28 85,25 90,28 95,45 105,55 115,52 130,48 145,42 160,45 168,52 155,65 145,72 158,80 172,85 185,90 175,98 160,102 145,108 135,122 125,135 115,148 105,145 95,138 85,125 75,128 65,140 55,152" fill="#0f0f0f" /></svg>
                <svg class="map-layer" viewBox="0 0 200 200">
                    <polygon points="48,162 42,155 35,140 32,125 40,118 48,110 40,102 42,92 50,90 58,85 65,72 70,55 75,40 80,28 85,25 90,28 95,45 105,55 115,52 130,48 145,42 160,45 168,52 155,65 145,72 158,80 172,85 185,90 175,98 160,102 145,108 135,122 125,135 115,148 105,145 95,138 85,125 75,128 65,140 55,152" fill="#1a1a1a" stroke="#333" stroke-width="1" stroke-linejoin="round"/>
                    <path d="M 48 162 L 185 90 M 80 28 L 115 148 M 40 102 L 160 45" stroke="#222" stroke-width="0.5" />
                    <circle id="d0-point-0" class="map-point" cx="65" cy="100" r="3" fill="#ffffff" /> 
                    <circle id="d0-point-1" class="map-point" cx="40" cy="140" r="3" fill="#ffffff" /> 
                    <circle id="d0-point-2" class="map-point" cx="95" cy="70" r="3" fill="#ffffff" /> 
                    <circle id="d0-point-3" class="map-point" cx="145" cy="100" r="3" fill="#ffffff" /> 
                    <circle id="d0-point-4" class="map-point" cx="55" cy="95" r="3" fill="#ffffff" /> 
                    <circle id="d0-point-5" class="map-point" cx="82" cy="30" r="3" fill="#ffffff" /> 
                    <circle id="d0-point-6" class="map-point" cx="115" cy="110" r="3" fill="#ffffff" /> 
                    <circle id="d0-point-7" class="map-point" cx="178" cy="92" r="3" fill="#ffffff" /> 
                </svg>
                <div id="d0-tower-0" class="tower-container" style="left: 32.5%; top: 50%;">
                    <svg class="tower-plane plane-1" viewBox="0 0 40 150"><polygon points="20,0 40,150 0,150" stroke-width="2"/><line x1="20" y1="0" x2="20" y2="150" stroke-dasharray="2 2"/><line x1="10" y1="75" x2="30" y2="75"/></svg>
                    <svg class="tower-plane plane-2" viewBox="0 0 40 150"><polygon points="20,0 40,150 0,150" stroke-width="2"/><line x1="20" y1="0" x2="20" y2="150" stroke-dasharray="2 2"/><line x1="10" y1="75" x2="30" y2="75"/></svg>
                </div>
            </div>
        </div>

        <!-- District 1: 智利 Chile -->
        <div id="map-district-1" class="map-3d-container next">
            <div class="map-3d">

    window.prevDistrict = function() {
        currentDistrictIndex = (currentDistrictIndex > 0) ? currentDistrictIndex - 1 : districtsData.length - 1;
        currentLocationIndex = 0;
        updateMapCarousel();
        renderMenu();
    }
    window.nextDistrict = function() {
        currentDistrictIndex = (currentDistrictIndex < districtsData.length - 1) ? currentDistrictIndex + 1 : 0;
        currentLocationIndex = 0;
        updateMapCarousel();
        renderMenu();
    }

    function updateMapCarousel() {
        districtsData.forEach((_, index) => {
            const mapEl = document.getElementById(`map-district-${index}`);
            mapEl.classList.remove('active', 'prev', 'next');
            if (index === currentDistrictIndex) {
                mapEl.classList.add('active');
            } else if (index < currentDistrictIndex || (currentDistrictIndex === 0 && index === districtsData.length - 1)) {
                mapEl.classList.add('prev');
            } else {
                mapEl.classList.add('next');
            }
        });
    }

    function updateStatsPanel(stats) {
        document.getElementById('stat-pop-text').innerText = `${stats.pop}%`;
        document.getElementById('stat-pop-bar').style.width = `${stats.pop}%`;

        const yujie = stats.vibes[0];
        const shaoyu = stats.vibes[1];
        const shaonv = stats.vibes[2];
        
        document.getElementById('stat-v1').innerText = `${yujie}%`;
        document.getElementById('stat-v2').innerText = `${shaoyu}%`;
        document.getElementById('stat-v3').innerText = `${shaonv}%`;

        document.getElementById('pie-yujie').setAttribute('stroke-dasharray', `${yujie} ${100 - yujie}`);
        document.getElementById('pie-yujie').setAttribute('stroke-dashoffset', `25`); 
        
        document.getElementById('pie-shaoyu').setAttribute('stroke-dasharray', `${shaoyu} ${100 - shaoyu}`);
        document.getElementById('pie-shaoyu').setAttribute('stroke-dashoffset', `${25 - yujie}`);
        
        document.getElementById('pie-shaonv').setAttribute('stroke-dasharray', `${shaonv} ${100 - shaonv}`);
        document.getElementById('pie-shaonv').setAttribute('stroke-dashoffset', `${25 - yujie - shaoyu}`);

        const jobsContainer = document.getElementById('stat-jobs-container');
        jobsContainer.innerHTML = '';
        stats.jobs.forEach(job => {
            jobsContainer.innerHTML += `
                <div class="flex justify-between items-center w-full">
                    <span class="text-[#8e939f] w-14">${job.n}</span>

                    </div>
                    <span class="text-white w-6 text-right">${job.v}%</span>
                </div>
            `;
        });
    }

    function renderMenu() {
        const currentData = districtsData[currentDistrictIndex];
        const currentItem = currentData.items[currentLocationIndex];
        
        districtTitle.innerText = currentData.name;

        menuContainer.innerHTML = '';
        currentData.items.forEach((item, index) => {
            const isActive = index === currentLocationIndex;
            const menuItemHTML = `
                <div class="menu-item flex items-stretch cursor-pointer ${isActive ? 'active' : ''}" onclick="selectItem(${index})">
                    <div class="menu-item-box flex-grow">
                        ${item.label}
                    </div>
                    <div class="menu-indicator-box">
                        <div class="indicator-core"></div>
                    </div>
                </div>
            `;
            menuContainer.innerHTML += menuItemHTML;
        });
        
        currentData.items.forEach((item, index) => {
            const pointId = `d${currentDistrictIndex}-point-${index}`;
            const pointEl = document.getElementById(pointId);
            if (pointEl) {
                if (index === currentLocationIndex) {
                    pointEl.classList.add('active');
                } else {
                    pointEl.classList.remove('active');
                }
            }

                    if (index === currentLocationIndex) {
                        towerEl.classList.add('active');
                    } else {
                        towerEl.classList.remove('active');
                    }
                }
            }
        });

        if (menuContainer.children[currentLocationIndex]) {
            menuContainer.children[currentLocationIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        typeMessage(currentItem.message);

        videoWrapper.classList.remove('active');
        statsPanel.classList.remove('active');
        trackingLine.classList.remove('active');
        trackingDot.classList.remove('active');
        trackingAnchor.classList.remove('active');
        
        setTimeout(() => {
            if(currentItem.stats) updateStatsPanel(currentItem.stats);

                videoNode.src = currentItem.video;

                statsPanel.classList.add('active');
                trackingLine.classList.add('active');
                trackingDot.classList.add('active');
                trackingAnchor.classList.add('active');
            } else {
                videoNode.removeAttribute('src');
                videoNode.load();
            }

            const ptRect = activePoint.getBoundingClientRect();
            const vdRect = videoBox.getBoundingClientRect();
            const containerRect = document.getElementById('game-screen').getBoundingClientRect();
            
            const nx = ptRect.left + ptRect.width / 2 - containerRect.left;
            const ny = ptRect.top + ptRect.height / 2 - containerRect.top;
            
            const vx = vdRect.left - containerRect.left;
            const vy = vdRect.bottom - containerRect.top - 8;
            
            // 放大版面後的角度調整，讓轉折處線條看起來更俐落
            const elbowX = vx - 30;
            const elbowY = vy + 30;
            const points = `${nx},${ny} ${nx},${ny - 20} ${elbowX},${elbowY} ${vx},${vy}`;
            
            trackingLine.setAttribute('points', points);
            trackingDot.setAttribute('cx', nx);
            trackingDot.setAttribute('cy', ny);
            
            trackingAnchor.setAttribute('x', vx - 3);
            trackingAnchor.setAttribute('y', vy - 3);
        }
    }

    updateTrackingLine();

    let typeTimeout;
    function typeMessage(text) {
        clearTimeout(typeTimeout);
        messageText.innerHTML = '';
        let i = 0;
        function typeChar() {
            if (i < text.length) {
                messageText.innerHTML += text.charAt(i);
                i++;
                typeTimeout = setTimeout(typeChar, 15);
            }
        }
        typeChar();
    }

    window.selectItem = function(index) {
        if (currentLocationIndex !== index) {
            currentLocationIndex = index;
            renderMenu();
        }
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
            const itemsLength = districtsData[currentDistrictIndex].items.length;
            currentLocationIndex = (currentLocationIndex > 0) ? currentLocationIndex - 1 : itemsLength - 1;
            renderMenu();
            e.preventDefault();
        } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
            const itemsLength = districtsData[currentDistrictIndex].items.length;
            currentLocationIndex = (currentLocationIndex < itemsLength - 1) ? currentLocationIndex + 1 : 0;
            renderMenu();
            e.preventDefault();
        } 
        else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
            prevDistrict();
            e.preventDefault();
        } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
            nextDistrict();
            e.preventDefault();
        }
        else if (e.key === 'Enter' || e.key === ' ') {
            const currentText = messageText.innerText;
            messageText.innerHTML = "<span style='color:#e8a81a'>Connecting to Node...</span>";
            setTimeout(() => {
                typeMessage(currentText);
            }, 400);
        }
    });

    updateMapCarousel();
    renderMenu();
</script>

</body>
</html>
